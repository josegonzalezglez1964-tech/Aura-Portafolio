El error es de **indentación en YAML**. En el archivo `config.yml`, las colecciones no están correctamente alineadas. Te falta el guión `-` antes de `name: "projects"` o hay un problema de sangría.

Aquí está el **`config.yml` corregido** con la indentación correcta:

```yaml
