              - { label: "Título línea 2 (dorada) — English", name: "line2_en", widget: "string" }
              - { label: "Subtítulo — Español", name: "lede_es", widget: "text" }
              - { label: "Subtítulo — English", name: "lede_en", widget: "text" }
              - { label: "Texto del botón — Español", name: "cta_es", widget: "string" }
              - { label: "Texto del botón — English", name: "cta_en", widget: "string" }
              - { label: "Imagen de fondo", name: "image", widget: "image" }
          
          - label: "Sobre mí"
            name: "about"
            widget: "object"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
