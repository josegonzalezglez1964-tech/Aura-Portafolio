              - { label: "EstadГӯstica 1 вҖ” etiqueta ES", name: "stat1_label_es", widget: "string" }
              - { label: "EstadГӯstica 1 вҖ” etiqueta EN", name: "stat1_label_en", widget: "string" }
              - { label: "EstadГӯstica 2 вҖ” nГәmero", name: "stat2_num", widget: "string" }
              - { label: "EstadГӯstica 2 вҖ” etiqueta ES", name: "stat2_label_es", widget: "string" }
              - { label: "EstadГӯstica 2 вҖ” etiqueta EN", name: "stat2_label_en", widget: "string" }
              - { label: "EstadГӯstica 3 вҖ” nГәmero", name: "stat3_num", widget: "string" }
              - { label: "EstadГӯstica 3 вҖ” etiqueta ES", name: "stat3_label_es", widget: "string" }
              - { label: "EstadГӯstica 3 вҖ” etiqueta EN", name: "stat3_label_en", widget: "string" }
              - { label: "EstadГӯstica 4 вҖ” nГәmero", name: "stat4_num", widget: "string" }
              - { label: "EstadГӯstica 4 вҖ” etiqueta ES", name: "stat4_label_es", widget: "string" }
              - { label: "Estad              - { label: "Estad              - { label: "Estad              - { label: "Estad       
            name: "contact"
            widget: "object"
            fields:
              - { label: "SubtГӯtulo вҖ” EspaГұol", name: "sub_es", widget: "text" }
              - { label: "SubtГӯtulo вҖ” English", name: "sub_en", widget: "text" }
              - { label: "Correo electrГіnico", name              - { label: "Correo electrГіnico", name              - { label: "Correo ele: "social", widget: "string" }
              - { label: "UbicaciГіn вҖ” EspaГұol", name: "location_es", widget: "string" }
              - { label: "UbicaciГіn вҖ” English", name: "location_en", widget: "string" }
  - name: "projects"
    label: "Proyectos"
    files:
      - file: "content/projects.json"
        name: "projects"
        label: "Lista de proyectos"
        fields:
          - label: "Proyectos"
            name: "projects"
            widget: "list"
            summary: "{{title_es}} ({{year}})"
            fields:
              - label: "CategorГӯa"
                name: "cat"
                widget: "select"
                options:
                  - { label: "Desarrollo", value: "dev" }
                  - { label: "FotografГӯa", value: "photo" }
              - { label: "AГұo", name: "year", widget: "string" }
              - { label: "Mostrar en Inicio (destacado)", name: "featured", widget: "boolean", default: false }
              - { label: "Imagen", name: "image", widget: "image" }
              - { label: "TГӯtulo вҖ” EspaГұol", name: "title_es", widget: "string" }
              - { label: "TГӯtulo вҖ” English", name: "title_en", widget: "string" }
              - { label: "DescripciГіn вҖ” EspaГұol", name: "desc_es", widget: "text" }
                                           English", name: "desc_en", wi                             - { label: "Etiquetas", name: "tags", widget: "list" }
              - { label: "URL del proyecto (opcional)", name: "url", widget: "string", required: false }
