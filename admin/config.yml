**Los cambios principales:**
1. Añadí el guión `-` antes de `name: "projects"` (línea 77 aprox)
2. Corregí la indentación para que ambas colecciones (`site` y `projects`) estén al mismo nivel
3. Añadí el campo `url` para que puedas poner enlaces en los proyectos

Copia este archivo completo, reemplaza tu `config.yml` actual, haz commit y push, y debería funcionar el admin.