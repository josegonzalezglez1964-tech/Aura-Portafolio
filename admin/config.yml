              - { label: "Estadística 1 — etiqueta EN", name: "stat1_label_en", widget: "string" }
              - { label: "Estadística 2 — número", name: "stat2_num", widget: "string" }
              - { label: "Estadística 2 — etiqueta ES", name: "stat2_label_es", widget: "string" }
              - { label: "Estadística 2 — etiqueta EN", name: "stat2_label_en", widget: "string" }
              - { label: "Estadística 3 — número", name: "stat3_num", widget: "string" }
              - { label: "Estadística 3 — etiqueta ES", name: "stat3_label_es", widget: "string" }
              - { label: "Estadística 3 — etiqueta EN", name: "stat3_label_en", widget: "string" }
              - { label: "Estadística 4 — número", name: "stat4_num", widget: "string" }
              - { label: "Estadística 4 — etiqueta ES", name: "stat4_label_es", widget: "string" }
              - { label: "Estadística 4 — etiqueta EN", name: "stat4_label_en", widget: "string" }
          
