backend:
  name: git-gateway
  branch: main
  media_folder: "content/images"
  public_folder: "/content/images"
  locale: "es"

collections:
  - name: "site"
    label: "Textos generales"
    files:
      - file: "content/site.json"
        name: "site"
        label: "Inicio В· Sobre mГӯ В· Contacto"
        fields:
          - label: "Inicio (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Etiqueta вҖ” EspaГұol", name: "eyebrow_es", widget: "string" }
              - { label: "Etiqueta вҖ” English", name: "eyebrow_en", widget: "string" }
              - { label: "TГӯtulo lГӯnea 1 вҖ” EspaГұol", name: "line1_es", widget: "string" }
              - { label: "TГӯtulo lГӯnea 1 вҖ” English", name: "line1_en", widget: "string" }
              - { label: "TГӯtulo lГӯnea 2 (dorada) вҖ” EspaГұol", name: "line2_es", widget: "string" }
              - { label: "TГӯtulo lГӯnea 2 (dorada) вҖ” English", name: "line2_en", widget: "s              - { label: { label: "SubtГӯ          spaГұol",     : "lede_es"              - { label: "TГ                   - { label: "TГnglish"  name: "lede_en", widget: "text" }
              - { label: "Texto del botГіn вҖ” EspaГұol", name: "cta_es", widget: "string" }
              - { label: "Texto del botГіn вҖ” English", name: "cta_en", widget: "string" }
              - { label: "Imagen de fondo", name: "image", widget: "image" }
          - label: "Sobre mГӯ"
            name: "about"
            widget: "object"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Rol вҖ” EspaГұol", name: "role_es", widget: "string" }
              - { label: "Rol вҖ” English", name: "role_en", widget: "string" }
              - { label: "PГЎrrafo 1 вҖ” EspaГұol", name: "p1_es", widget: "text" }
              - { label: "PГЎrrafo 1 вҖ” English", name: "p1_en", widget: "text" }
              - { label: "PГЎrrafo 2 вҖ” EspaГұol", name: "p2_es", widget: "text" }
              - { label: "PГЎrrafo 2 вҖ” English", name: "p2_en", widget: "text" }
              - { label: "Foto de retrato", name: "portrait", widget: "image" }
