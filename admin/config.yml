  name: git-gateway
  branch: main
  media_folder: "content/images"
  public_folder: "/content/images"
  locale: "es"

collections:
  - name: "site"
    label: "Textos generales"
    files:
      - file: "content/site.json"
        name: "site"
        label: "Inicio · Sobre mí · Contacto"
        fields:
          - label: "Inicio (Hero)"
            name: "hero"
            widget: "object"
            fields:
